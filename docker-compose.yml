version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: market-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: market_yookassa
      POSTGRES_USER: marketuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - market-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketuser -d market_yookassa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: market-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://marketuser:${DB_PASSWORD}@postgres:5432/market_yookassa?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      UPLOAD_DIR: uploads
    volumes:
      - ./uploads:/app/uploads
      - ./public/avatars:/app/public/avatars
      - ./public/covers:/app/public/covers
      - ./public/category-icons:/app/public/category-icons
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - market-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: market-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./public/avatars:/usr/share/nginx/html/avatars:ro
      - ./public/covers:/usr/share/nginx/html/covers:ro
      - ./public/category-icons:/usr/share/nginx/html/category-icons:ro
    depends_on:
      - app
    networks:
      - market-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  market-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
